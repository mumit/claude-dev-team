name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install rsync (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y rsync

      - name: Verify rsync available (macOS)
        if: runner.os == 'macOS'
        run: rsync --version

      - run: npm install

      - name: Audit devDependencies (high + critical)
        run: npm audit --audit-level=high

      - run: npm run lint

      - run: npm test
