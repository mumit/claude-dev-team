# Claude Code Dev Team — project configuration
#
# This file is committed to your project. Adapter-specific fields that
# carry credentials or environment-specific paths should live in
# .claude/config.local.yml (gitignored) and the adapter picks them up
# by merging local over this file.
#
# See .claude/adapters/README.md for the adapter contract and the
# individual .claude/adapters/<name>.md files for per-adapter config.

framework:
  version: "2.4"

deploy:
  # Which adapter Stage 8 uses.
  # Built-in: docker-compose, kubernetes, terraform, custom.
  adapter: docker-compose

  # Per-adapter config blocks. Only the block matching the selected
  # adapter is read; others are ignored.

  docker_compose:
    compose_file: docker-compose.yml
    build_no_cache: true
    smoke_test_timeout_s: 30

  kubernetes:
    # strategy: manifests | helm
    strategy: manifests
    namespace: ""         # TODO(project): set before first deploy
    context: ""           # TODO(project): must match kubectl context
    manifests_dir: k8s/manifests
    kustomize_overlay: null
    chart_dir: k8s/chart
    release_name: ""      # TODO(project)
    values_files: []
    image_repository: ""  # TODO(project)
    image_tag_from: git_sha
    rollout_timeout_s: 300
    smoke_services: []

  terraform:
    binary: terraform
    working_dir: infra
    workspace: ""         # TODO(project): e.g. prod
    var_files: []
    auto_approve: false
    plan_output_path: pipeline/terraform-plan.bin
    drift_check: true
    smoke_urls: []

  custom:
    script: ""            # TODO(project): path to deploy script
    args: []
    timeout_s: 1200
    smoke_commands: []

# Optional: the security heuristic path list for Stage 4.5b.
# Override in .claude/config.local.yml if your project's directory
# layout differs from the defaults.
security:
  trigger_paths:
    - "src/backend/auth*"
    - "src/backend/crypto*"
    - "src/backend/payment*"
    - "src/backend/pii*"
    - "src/backend/session*"
    - "*secret*"
    - "*token*"
    - "*credential*"

# Budget gate (v2.5+, opt-in).
#
# When enabled, the orchestrator tracks token usage and wall-clock time
# per pipeline run and writes `pipeline/budget.md`. After each stage
# boundary, the orchestrator compares the running totals to the
# configured maximums. On exceed:
#
#   - `escalate`: write a budget-breach ESCALATE gate and halt
#   - `warn`: log a warning but continue (useful for calibration runs)
#
# Token counts are approximate — the orchestrator estimates from Claude
# Code's reported usage per invocation where available, and from
# character counts of inputs/outputs where not. The budget gate is
# best-effort guardrail, not a cryptographic limit.
budget:
  enabled: false
  tokens_max: 500000
  wall_clock_max_minutes: 90
  on_exceed: escalate  # or: warn

# Async-friendly checkpoints (v2.5+, opt-in per checkpoint).
#
# By default, the pipeline halts at Checkpoints A, B, and C waiting for
# a human "proceed". For teams that want to pre-approve certain
# checkpoints when a precondition holds, set `auto_pass_when` for any
# of them. When the named condition is true, the checkpoint prints its
# summary, writes an auto-pass record to pipeline/context.md, and
# proceeds without waiting.
#
# Supported conditions (keep simple — no expression language):
#   - null / absent: always wait for human (default)
#   - "no_warnings": auto-pass if the stage gate has zero warnings
#   - "all_criteria_passed": auto-pass if stage-06 had 100% pass
#                            (Checkpoint C only)
#
# Checkpoint A gates the brief; Checkpoint B gates the design; C gates
# the tests. Never auto-pass a checkpoint for security-sensitive work
# — the stoplist in Stage 0 and the security-engineer veto at Stage
# 4.5b remain the hard guards.
checkpoints:
  a:
    auto_pass_when: null
  b:
    auto_pass_when: null
  c:
    auto_pass_when: null
